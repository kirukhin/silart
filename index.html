<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silart</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --blue-main: rgb(47,90,107);
    --blue-dark: rgb(32,77,93);
    --blue-light: rgb(65,107,124);
    --accent: rgb(227,30,41);
    --white: #ffffff;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Roboto', sans-serif;
    color: var(--white);
    min-height:100vh;           /* Изменено: вместо height — min-height, чтобы контент мог расширяться */
    overflow-x:hidden;          /* Горизонтальной прокрутки не будет, вертикальная — по необходимости */
    overflow-y:auto;            /* Разрешаем вертикальную прокрутку, если контент не помещается */
}

/* ===== TOP ===== */
.top {
    position:relative;
    min-height:100vh;           /* Минимум высота экрана, но может увеличиваться */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    padding-bottom: calc(33.333vh + 20px); /* Добавляем отступ снизу, равный высоте блока с линиями + небольшой зазор */
    z-index:1;
}

.top::before {
    content:'';
    position:absolute;
    inset:0;
    background: url('https://raw.githubusercontent.com/kirukhin/silart/main/shkaf2.png') center/cover no-repeat;
    z-index:0;
}

.top::after {
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(
        135deg,
        rgba(47,90,107,0.85),
        rgba(32,77,93,0.95)
    );
    z-index:1;
}

.top-inner {
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* LOGO */
.logo {
    width:240px;
    margin-bottom:25px;
}

/* TITLE */
.title {
    font-size:1.6rem;
    opacity:0.9;
    margin-bottom:80px;
}

/* ===== CTA (перенесён наверх) ===== */
.cta {
    display:flex;
    align-items:center;
    gap:20px;

    background: rgba(255,255,255,0.92);
    color:#000;
    padding:18px 22px;
    border-radius:10px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.35);

    margin-bottom:80px;
}

.cta img {
    width:55px;
}

.cta-text {
    text-align:left;
}

.cta-title {
    font-size:1.05rem;
    font-weight:500;
    margin-bottom:5px;
}

.cta-btn {
    display:inline-block;
    margin-top:5px;
    padding:8px 14px;
    background: var(--accent);
    color:white;
    text-decoration:none;
    font-size:0.85rem;
}

/* CONTACT */
.contact {
    margin-top:10px;
    font-size:1.05rem;
    opacity:0.9;
}

.contact a {
    color:white;
    text-decoration:none;
}

.contact a:hover {
    color: var(--accent);
}

/* ===== BOTTOM (декор) — поведение не меняли ===== */
.bottom {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:33.333vh;
    z-index:2;
    overflow:hidden;
    pointer-events: none;       /* Чтобы линии не мешали кликам по контактам, если они перекрываются */
}

/* SVG */
.lines {
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
    object-position:right top;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

    .cta {
        flex-direction:column;
        text-align:center;
    }

    .cta img {
        width:50px;
    }

    .cta-text {
        text-align:center;
    }

    .logo {
        width:180px;
    }

    .title {
        font-size:1.2rem;
    }

    .contact {
        font-size:0.9rem;
    }

    /* На мобильных дополнительно увеличиваем нижний отступ, чтобы точно всё помещалось */
    .top {
        padding-bottom: calc(33.333vh + 30px);
    }
}

/* Для совсем маленьких экранов, где контент может быть выше */
@media(max-height: 650px) and (max-width: 600px) {
    .top {
        padding-bottom: calc(33.333vh + 45px);
        justify-content: flex-start; /* Сдвигаем контент вверх, чтобы легче было прокрутить */
        padding-top: 40px;
    }
    
    .title {
        margin-bottom: 40px;
    }
    
    .cta {
        margin-bottom: 40px;
    }
}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
    <div class="top-inner">

        <img src="https://dev.silart.com/wp-content/uploads/img-logo-dark-mode.svg" class="logo">

        <div class="title">
            Системы управления технологическим климатом
        </div>

        <!-- CTA -->
        <div class="cta">
            <img src="https://raw.githubusercontent.com/kirukhin/silart/d5845f2ddc13ce04ea577ae1971664de166cfa38/cat.png">

            <div class="cta-text">
                <div class="cta-title">
                    Скачать каталог продукции 2026
                </div>

                <a href="https://github.com/kirukhin/silart/blob/92c96b471bbf2582ab19b4fcf1e93438fd83a5cf/%D0%9A%D0%B0%D1%82%D0%B0%D0%BB%D0%BE%D0%B3%20%D0%BF%D1%80%D0%BE%D0%B4%D1%83%D0%BA%D1%86%D0%B8%D0%B8-2026.pdf" class="cta-btn" target="_blank">
                    Скачать
                </a>
            </div>
        </div>

        <!-- CONTACT -->
        <div class="contact">
            📞 <a href="tel:+74992296000">+7 (499) 229-60-00</a> |
            ✉️ <a href="mailto:info@silart.com">info@silart.com</a>
        </div>

    </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
    <img 
        src="https://raw.githubusercontent.com/kirukhin/silart/refs/heads/main/lines.svg" 
        class="lines"
    >
</div>

</body>
</html>
